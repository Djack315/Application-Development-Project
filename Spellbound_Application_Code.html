<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spellbound Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
    }
    .container { margin-top: 40px; }
    .word {
      font-size: 28px;
      letter-spacing: 10px;
      margin: 20px;
    }
    input {
      padding: 10px;
      font-size: 18px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    .hint {
      margin-top: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Welcome to Spellbound!</h1>
    <p>A word guessing game</p>

    <p id="level"></p>
    <div class="word" id="word"></div>

    <input type="text" id="guess" placeholder="Type the word" />
    <br>
    <button onclick="checkGuess()">Submit</button>

    <p id="message"></p>
    <p class="hint" id="hint"></p>
  </div>

<script>
const levels = [
  {word:"cat", hint:"A small pet"},
  {word:"tree", hint:"Grows in forests"},
  {word:"apple", hint:"A common fruit"},
  {word:"river", hint:"Flows with water"},
  {word:"planet", hint:"Earth is one"},
  {word:"silver", hint:"A shiny metal"},
  {word:"mystery", hint:"Something unknown"},
  {word:"adventure", hint:"An exciting journey"},
  {word:"knowledge", hint:"Gained by learning"},
  {word:"spellbound", hint:"Completely fascinated"}
];

let currentLevel = 0;
let word = "";
let guessed = [];

function initLevel() {
  word = levels[currentLevel].word;
  guessed = Array(word.length).fill("_");

  document.getElementById("level").innerText = "Level " + (currentLevel + 1);
  document.getElementById("hint").innerText = "Hint: " + levels[currentLevel].hint;
  document.getElementById("guess").value = "";
  updateDisplay();
}

function updateDisplay() {
  document.getElementById("word").innerText = guessed.join(" ");
}

function checkGuess() {
  let input = document.getElementById("guess").value.toLowerCase();

  if (input.length !== word.length) {
    document.getElementById("message").innerText = "Word must be " + word.length + " letters!";
    return;
  }

  if (input === word) {
    document.getElementById("message").innerText = "Correct!";

    setTimeout(() => {
      currentLevel++;
      if (currentLevel < levels.length) {
        initLevel();
      } else {
        alert("🎉 You completed all levels!");
      }
    }, 800);
  } else {
    document.getElementById("message").innerText = "Try again!";
  }
}

initLevel();
</script>
</body>
</html>
